<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>裁片识别工具</title>
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #2c2c2c;
            color: #e6e6e6;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 13px;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            min-height: 32px;
            border: 1px solid #5a5a5a;
            border-radius: 3px;
            background: #3d3d3d;
            color: #f4f4f4;
            cursor: pointer;
            padding: 6px 12px;
        }

        button:hover:not(:disabled) {
            background: #4a4a4a;
        }

        button:disabled {
            color: #858585;
            cursor: default;
            opacity: 0.7;
        }

        button.primary {
            border-color: #0d65d9;
            background: #1473e6;
            color: #fff;
        }

        button.primary:hover:not(:disabled) {
            background: #0d66d0;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            padding: 12px;
            gap: 12px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .panel-title {
            min-width: 0;
            color: #f2f2f2;
            font-size: 14px;
            font-weight: 600;
            white-space: nowrap;
        }

        .panel-header button {
            flex: 0 0 auto;
        }

        .control-band {
            display: grid;
            grid-template-columns: 82px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-top: 1px solid #454545;
            border-bottom: 1px solid #454545;
            max-height: 65vh;
            overflow-y: auto;
        }

        .control-band label,
        .file-kind {
            color: #bdbdbd;
        }

        .size-settings {
            grid-column: 1 / -1;
            min-width: 0;
            border-top: 1px solid #454545;
            padding-top: 8px;
        }

        .size-settings>summary {
            display: flex;
            align-items: center;
            min-height: 32px;
            color: #e6e6e6;
            cursor: pointer;
            font-weight: 600;
            list-style: none;
            user-select: none;
        }

        .size-settings>summary::-webkit-details-marker {
            display: none;
        }

        .size-settings>summary::before {
            width: 18px;
            color: #a9a9a9;
            content: "▶";
            font-size: 10px;
        }

        .size-settings[open]>summary::before {
            content: "▼";
        }

        .size-settings>summary:focus-visible {
            outline: 1px solid #2680eb;
            outline-offset: 2px;
        }

        .size-settings-grid {
            display: grid;
            grid-template-columns: 82px minmax(0, 1fr);
            align-items: center;
            gap: 10px;
            padding-top: 10px;
        }

        .pattern-actions {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 8px;
            padding: 10px 0 2px;
        }

        .pattern-actions button {
            min-width: 0;
        }

        .segmented-control {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            overflow: hidden;
            border: 1px solid #555;
            border-radius: 3px;
        }

        .segmented-control input {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        .segmented-control label {
            min-width: 0;
            min-height: 30px;
            padding: 7px 3px;
            border-right: 1px solid #555;
            color: #c8c8c8;
            cursor: pointer;
            text-align: center;
            white-space: nowrap;
        }

        .segmented-control label:last-child {
            border-right: 0;
        }

        .segmented-control input:checked + label {
            background: #1473e6;
            color: #fff;
        }

        input,
        select {
            width: 100%;
            min-width: 0;
            height: 32px;
            border: 1px solid #555;
            border-radius: 2px;
            background: #242424;
            color: #f0f0f0;
            padding: 0 8px;
        }

        input::placeholder {
            color: #777;
        }

        .unit-input {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 34px;
            align-items: center;
            gap: 8px;
            min-width: 0;
        }

        .unit-label {
            color: #a9a9a9;
            white-space: nowrap;
        }

        .inline-file-picker {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            min-width: 0;
            gap: 6px;
        }

        .file-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .file-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 8px;
            min-height: 42px;
            padding-bottom: 8px;
            border-bottom: 1px solid #404040;
        }

        .file-meta {
            display: grid;
            grid-template-columns: 72px minmax(0, 1fr);
            align-items: center;
            min-width: 0;
            gap: 8px;
        }

        .file-name {
            min-width: 0;
            overflow: hidden;
            color: #f0f0f0;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-name.empty {
            color: #858585;
        }

        .file-actions {
            display: flex;
            gap: 4px;
        }

        .icon-button {
            width: 32px;
            padding: 0;
            font-size: 18px;
            line-height: 1;
        }

        #btn-import {
            width: 100%;
        }

        .result-section {
            display: flex;
            flex: 1 1 auto;
            flex-direction: column;
            min-height: 150px;
            gap: 6px;
        }

        .result-label {
            color: #bdbdbd;
        }

        #result-box {
            width: 100%;
            min-height: 0;
            flex: 1 1 auto;
            resize: none;
            border: 1px solid #444;
            border-radius: 2px;
            background: #1e1e1e;
            color: #7ee787;
            padding: 9px;
            font-family: Consolas, "Microsoft YaHei", monospace;
            font-size: 12px;
            line-height: 1.5;
        }

        @media (max-height: 700px) {
            .app-shell {
                padding: 8px;
                gap: 8px;
            }

            button {
                min-height: 28px;
                padding: 4px 10px;
            }

            input,
            select {
                height: 28px;
            }

            .control-band {
                gap: 6px 10px;
                padding: 6px 0;
            }

            .size-settings-grid {
                gap: 6px 10px;
                padding-top: 6px;
            }

            .file-section {
                gap: 6px;
            }

            .file-row {
                min-height: 36px;
                padding-bottom: 6px;
            }

            .result-section {
                min-height: 80px;
            }
        }

        @media (max-width: 350px) {
            .app-shell {
                padding: 10px;
                gap: 10px;
            }

            .panel-header {
                align-items: stretch;
                flex-direction: column;
            }

            .panel-header button {
                width: 100%;
            }

            .file-meta {
                grid-template-columns: 62px minmax(0, 1fr);
            }
        }
    </style>
</head>

<body>
    <main class="app-shell">
        <header class="panel-header">
            <div class="panel-title">ETCAD 裁片导入</div>
            <button id="btn-scan" type="button">扫描当前文档</button>
        </header>

        <div class="control-band">
            <label for="notch-style">刀口类型</label>
            <select id="notch-style">
                <option value="straight" selected>一字型（直刀口）</option>
                <option value="t">T 形</option>
                <option value="v-in">内向 V</option>
                <option value="v-out">外向 V</option>
            </select>
            <label for="btn-apply-style">参数样例</label>
            <button id="btn-apply-style" type="button">更新样式</button>
            <details class="size-settings">
                <summary>尺码标记</summary>
                <div class="size-settings-grid">
                    <label for="size-anchor">尺码锚点组</label>
                    <select id="size-anchor">
                        <option value="">暂无锚点组</option>
                    </select>
                    <label for="order-code">订单编码</label>
                    <input id="order-code" type="text" maxlength="80" placeholder="请输入订单编码">
                    <label for="size-tag-height">码标高度</label>
                    <div class="unit-input">
                        <input id="size-tag-height" type="number" min="0.1" step="0.1" value="4">
                        <span class="unit-label">毫米</span>
                    </div>
                    <label for="btn-label-sizes">执行</label>
                    <button id="btn-label-sizes" type="button" disabled>一键标尺码</button>
                </div>
            </details>
            <details class="size-settings">
                <summary>元素修改继承</summary>
                <div class="size-settings-grid">
                    <label for="inheritance-base-size">基准尺码组</label>
                    <select id="inheritance-base-size">
                        <option value="">暂无基准尺码组</option>
                    </select>
                    <label for="btn-set-inheritance-base">修改基准</label>
                    <button id="btn-set-inheritance-base" type="button" disabled>设为基准</button>
                    <label for="btn-select-inheritance-rul">RUL规则</label>
                    <div class="inline-file-picker">
                        <span id="inheritance-rul-file-name" class="file-name empty" title="">未选择</span>
                        <button id="btn-select-inheritance-rul" type="button">选择</button>
                    </div>
                    <label for="btn-inherit-sizes">执行</label>
                    <button id="btn-inherit-sizes" class="primary" type="button" disabled>继承元素修改</button>
                </div>
            </details>
            <details class="size-settings">
                <summary>一键套花</summary>
                <div class="pattern-actions">
                    <button id="btn-create-pattern" class="primary" type="button" disabled>一键套花</button>
                    <button id="btn-clear-pattern" type="button">清空套花</button>
                    <button id="btn-use-seam-boundary" type="button">使用缝边</button>
                    <button id="btn-use-clean-boundary" type="button">使用净边</button>
                </div>
                <div class="size-settings-grid">
                    <label for="pattern-base-size">基准尺码组</label>
                    <select id="pattern-base-size">
                        <option value="">请选择基准尺码组</option>
                    </select>
                    <label>套图类型</label>
                    <div class="segmented-control" role="radiogroup" aria-label="套图类型">
                        <input id="pattern-type-background" name="pattern-type" type="radio" value="background" checked>
                        <label for="pattern-type-background">底图</label>
                        <input id="pattern-type-logo" name="pattern-type" type="radio" value="logo">
                        <label for="pattern-type-logo">Logo</label>
                        <input id="pattern-type-name" name="pattern-type" type="radio" value="name">
                        <label for="pattern-type-name">名字</label>
                        <input id="pattern-type-number" name="pattern-type" type="radio" value="number">
                        <label for="pattern-type-number">号码</label>
                        <input id="pattern-type-other" name="pattern-type" type="radio" value="other">
                        <label for="pattern-type-other">其他</label>
                    </div>
                    <label for="btn-inherit-pattern">执行</label>
                    <button id="btn-inherit-pattern" class="primary" type="button" disabled>继承套图</button>
                </div>
            </details>
        </div>

        <section class="file-section" aria-label="导入文件">
            <div class="file-row">
                <div class="file-meta">
                    <span class="file-kind">DXF 文件</span>
                    <span id="dxf-file-name" class="file-name empty" title="">未选择</span>
                </div>
                <div class="file-actions">
                    <button id="btn-select-dxf" type="button">选择</button>
                </div>
            </div>

            <div class="file-row">
                <div class="file-meta">
                    <span class="file-kind">RUL 文件</span>
                    <span id="rul-file-name" class="file-name empty" title="">未选择（可选）</span>
                </div>
                <div class="file-actions">
                    <button id="btn-select-rul" type="button">选择</button>
                    <button id="btn-clear-rul" class="icon-button" type="button" title="清除 RUL" aria-label="清除 RUL">×</button>
                </div>
            </div>

            <button id="btn-import" class="primary" type="button" disabled>开始导入</button>
        </section>

        <section class="result-section">
            <label class="result-label" for="result-box">运行结果</label>
            <textarea id="result-box" readonly placeholder="运行结果将显示在这里"></textarea>
        </section>
    </main>

    <script src="./js/CSInterface.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
