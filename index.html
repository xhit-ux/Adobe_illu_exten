<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>裁片识别工具</title>
    <style>
        * {
            box-sizing: border-box;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
            width: 0;
            height: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }

        body {
            background: #2c2c2c;
            color: #e6e6e6;
            font-family: "Segoe UI", "Microsoft YaHei", sans-serif;
            font-size: 11px;
        }

        button,
        input,
        select,
        textarea {
            font: inherit;
        }

        button {
            min-height: 22px;
            border: 1px solid #5a5a5a;
            border-radius: 2px;
            background: #3d3d3d;
            color: #f4f4f4;
            cursor: pointer;
            padding: 2px 7px;
            font-size: 10px;
            line-height: 1.2;
            white-space: nowrap;
        }

        button:hover:not(:disabled) {
            background: #4a4a4a;
        }

        button:disabled {
            color: #858585;
            cursor: default;
            opacity: 0.7;
        }

        button.primary {
            border-color: #0d65d9;
            background: #1473e6;
            color: #fff;
        }

        button.primary:hover:not(:disabled) {
            background: #0d66d0;
        }

        .app-shell {
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 0;
            padding: 6px;
            gap: 6px;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }

        .panel-title {
            min-width: 0;
            color: #f2f2f2;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .panel-header button {
            flex: 0 0 auto;
        }

        .control-band {
            display: grid;
            grid-template-columns: 68px minmax(0, 1fr);
            align-items: center;
            gap: 5px 7px;
            padding: 4px 0;
            border-top: 1px solid #454545;
            border-bottom: 1px solid #454545;
            max-height: 65vh;
            overflow-y: auto;
        }

        .control-band label,
        .file-kind {
            color: #bdbdbd;
        }

        .size-settings {
            grid-column: 1 / -1;
            min-width: 0;
            border-top: 1px solid #454545;
            padding-top: 4px;
        }

        .size-settings>summary {
            display: flex;
            align-items: center;
            min-height: 23px;
            color: #e6e6e6;
            cursor: pointer;
            font-weight: 600;
            list-style: none;
            user-select: none;
        }

        .size-settings>summary::-webkit-details-marker {
            display: none;
        }

        .size-settings>summary::before {
            width: 14px;
            color: #a9a9a9;
            content: "▶";
            font-size: 8px;
        }

        .size-settings[open]>summary::before {
            content: "▼";
        }

        .size-settings>summary:focus-visible {
            outline: 1px solid #2680eb;
            outline-offset: 2px;
        }

        .size-settings-grid {
            display: grid;
            grid-template-columns: 68px minmax(0, 1fr);
            align-items: center;
            gap: 5px 7px;
            padding-top: 5px;
        }

        .inline-actions {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .inline-actions button {
            min-width: 0;
        }

        .control-band>button,
        .size-settings-grid>button {
            min-width: 72px;
            justify-self: start;
        }

        input,
        select {
            width: 100%;
            min-width: 0;
            height: 24px;
            border: 1px solid #555;
            border-radius: 2px;
            background: #242424;
            color: #f0f0f0;
            padding: 0 5px;
        }

        input::placeholder {
            color: #777;
        }

        .unit-input {
            display: grid;
            grid-template-columns: minmax(0, 1fr) 28px;
            align-items: center;
            gap: 4px;
            min-width: 0;
        }

        .unit-label {
            color: #a9a9a9;
            white-space: nowrap;
        }

        .inline-file-picker {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            min-width: 0;
            gap: 4px;
        }

        .file-section {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .file-row {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: center;
            gap: 4px;
            min-height: 28px;
            padding-bottom: 4px;
            border-bottom: 1px solid #404040;
        }

        .file-meta {
            display: grid;
            grid-template-columns: 58px minmax(0, 1fr);
            align-items: center;
            min-width: 0;
            gap: 4px;
        }

        .file-name {
            min-width: 0;
            overflow: hidden;
            color: #f0f0f0;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .file-name.empty {
            color: #858585;
        }

        .file-actions {
            display: flex;
            gap: 4px;
        }

        .icon-button {
            width: 22px;
            min-width: 22px;
            padding: 0;
            font-size: 14px;
            line-height: 1;
        }

       #btn-import {
           width: auto;
           min-width: 90px;
           align-self: flex-start;
       }

        .order-editor {
            display: flex;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .order-paste-input {
            width: 100%;
            min-height: 54px;
            max-height: 130px;
            resize: vertical;
            border: 1px solid #555;
            border-radius: 2px;
            background: #242424;
            color: #f0f0f0;
            padding: 5px;
            font-family: Consolas, "Microsoft YaHei", monospace;
            font-size: 10px;
            line-height: 1.35;
        }

        .order-paste-input:focus {
            outline: 1px solid #2680eb;
            outline-offset: -1px;
        }

        .order-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 4px;
        }

        .order-actions .order-status {
            min-width: 0;
            flex: 1 1 120px;
            overflow: hidden;
            color: #a9a9a9;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .order-table-section {
            display: none;
            flex-direction: column;
            gap: 4px;
            min-width: 0;
        }

        .order-table-section.visible {
            display: flex;
        }

        .order-table-wrap {
            width: 100%;
            max-height: 174px;
            overflow: auto;
            border: 1px solid #555;
            background: #242424;
        }

        .order-table {
            width: 100%;
            min-width: 360px;
            border-collapse: collapse;
            table-layout: fixed;
        }

        .order-table th,
        .order-table td {
            height: 23px;
            padding: 0;
            border-right: 1px solid #555;
            border-bottom: 1px solid #555;
            text-align: left;
        }

        .order-table th {
            height: 22px;
            padding: 0 4px;
            background: #353535;
            color: #d8d8d8;
            font-size: 9px;
            font-weight: 600;
            white-space: nowrap;
        }

        .order-table th:nth-child(1) { width: 20%; }
        .order-table th:nth-child(2),
        .order-table th:nth-child(6) { width: 12%; }
        .order-table th:nth-child(3) { width: 18%; }
        .order-table th:nth-child(4) { width: 14%; }
        .order-table th:nth-child(5) { width: 14%; }

        .order-table th:last-child,
        .order-table td:last-child {
            width: 24px;
            border-right: 0;
            text-align: center;
        }

        .order-table tr:last-child td {
            border-bottom: 0;
        }

        .order-table input {
            width: 100%;
            height: 22px;
            border: 0;
            border-radius: 0;
            background: #242424;
            color: #f0f0f0;
            padding: 0 4px;
            font-size: 10px;
        }

        .order-table input:focus {
            outline: 1px solid #2680eb;
            outline-offset: -1px;
        }

        .order-table input.invalid {
            outline: 1px solid #e45b5b;
            outline-offset: -1px;
        }

        .order-row-remove {
            width: 22px;
            min-width: 22px;
            min-height: 20px;
            border: 0;
            background: transparent;
            color: #aaa;
            padding: 0;
            font-size: 13px;
        }

        .result-section {
            display: flex;
            flex: 1 1 auto;
            flex-direction: column;
            min-height: 80px;
            gap: 3px;
        }

        .result-label {
            color: #bdbdbd;
        }

        #result-box {
            width: 100%;
            min-height: 0;
            flex: 1 1 auto;
            resize: none;
            border: 1px solid #444;
            border-radius: 2px;
            background: #1e1e1e;
            color: #7ee787;
            padding: 5px;
            font-family: Consolas, "Microsoft YaHei", monospace;
            font-size: 10px;
            line-height: 1.35;
        }

        @media (max-height: 700px) {
            .app-shell {
                padding: 4px;
                gap: 4px;
            }

            button {
                min-height: 20px;
                padding: 1px 6px;
            }

            input,
            select {
                height: 22px;
            }

            .control-band {
                gap: 4px 6px;
                padding: 3px 0;
            }

            .size-settings-grid {
                gap: 4px 6px;
                padding-top: 4px;
            }

            .file-section {
                gap: 3px;
            }

            .file-row {
                min-height: 24px;
                padding-bottom: 3px;
            }

            .result-section {
                min-height: 60px;
            }
        }

        @media (max-width: 350px) {
            .app-shell {
                padding: 5px;
                gap: 5px;
            }

            .file-meta {
                grid-template-columns: 52px minmax(0, 1fr);
            }
        }
    </style>
</head>

<body>
    <main class="app-shell">
        <header class="panel-header">
            <div class="panel-title">ETCAD 裁片导入</div>
            <button id="btn-scan" type="button">扫描当前文档</button>
        </header>

        <div class="control-band">
            <label for="notch-style">刀口类型</label>
            <select id="notch-style">
                <option value="straight" selected>一字型（直刀口）</option>
                <option value="t">T 形</option>
                <option value="v-in">内向 V</option>
                <option value="v-out">外向 V</option>
            </select>
            <label for="btn-apply-style">参数样例</label>
            <button id="btn-apply-style" type="button">更新样式</button>
            <details class="size-settings">
                <summary>尺码标记</summary>
                <div class="size-settings-grid">
                    <label for="size-anchor">尺码锚点组</label>
                    <select id="size-anchor">
                        <option value="">暂无锚点组</option>
                    </select>
                    <label for="order-code">订单编码</label>
                    <input id="order-code" type="text" maxlength="80" placeholder="请输入订单编码">
                    <label for="size-tag-height">码标高度</label>
                    <div class="unit-input">
                        <input id="size-tag-height" type="number" min="0.1" step="0.1" value="4">
                        <span class="unit-label">毫米</span>
                    </div>
                    <label for="btn-label-sizes">执行</label>
                    <button id="btn-label-sizes" type="button" disabled>一键标尺码</button>
                </div>
            </details>
            <details class="size-settings">
                <summary>二号尺码标</summary>
                <div class="size-settings-grid">
                    <label for="secondary-order-code">订单编码</label>
                    <input id="secondary-order-code" type="text" maxlength="80" placeholder="请输入订单编码">
                    <label for="secondary-size-tag-height">码标高度</label>
                    <div class="unit-input">
                        <input id="secondary-size-tag-height" type="number" min="0.1" step="0.1" value="12">
                        <span class="unit-label">毫米</span>
                    </div>
                    <label for="btn-label-secondary-sizes">执行</label>
                    <button id="btn-label-secondary-sizes" type="button">裁切并标记二号尺码</button>
                </div>
            </details>
            <details class="size-settings">
                <summary>元素修改继承</summary>
                <div class="size-settings-grid">
                    <label for="inheritance-base-size">基准尺码组</label>
                    <select id="inheritance-base-size">
                        <option value="">暂无基准尺码组</option>
                    </select>
                    <label for="btn-set-inheritance-base">修改基准</label>
                    <button id="btn-set-inheritance-base" type="button" disabled>设为基准</button>
                    <label for="btn-select-inheritance-rul">RUL规则</label>
                    <div class="inline-file-picker">
                        <span id="inheritance-rul-file-name" class="file-name empty" title="">未选择</span>
                        <button id="btn-select-inheritance-rul" type="button">选择</button>
                    </div>
                    <label for="btn-inherit-sizes">执行</label>
                    <button id="btn-inherit-sizes" class="primary" type="button" disabled>继承元素修改</button>
                </div>
            </details>
            <details class="size-settings">
                <summary>固定元素继承</summary>
                <div class="size-settings-grid">
                    <label>选中元素</label>
                    <div class="inline-actions">
                        <button id="btn-add-fixed-elements" class="primary" type="button">加入固定继承</button>
                        <button id="btn-remove-fixed-elements" type="button">移出固定继承</button>
                    </div>
                </div>
            </details>
            <details class="size-settings" open>
                <summary>个性化订单</summary>
                <div class="order-editor">
                    <textarea id="order-paste-input" class="order-paste-input" spellcheck="false" placeholder="将 Excel 六列表格粘贴到这里：订单编号｜尺码｜名字｜号码｜其它｜件数"></textarea>
                    <div class="order-actions">
                        <button id="btn-create-order-samples" type="button">生成名字/号码样例</button>
                        <button id="btn-parse-orders" type="button">识别表格</button>
                        <span id="order-status" class="order-status">等待粘贴订单数据</span>
                    </div>
                    <div id="order-table-section" class="order-table-section">
                        <div class="order-actions">
                            <button id="btn-submit-orders" class="primary" type="button" disabled>提交订单</button>
                            <button id="btn-add-order-row" type="button">新增一行</button>
                            <button id="btn-clear-orders" class="icon-button" type="button" title="清空识别结果" aria-label="清空识别结果">×</button>
                        </div>
                        <div class="order-table-wrap">
                            <table class="order-table" aria-label="个性化订单数据">
                                <thead>
                                    <tr>
                                        <th>订单编号</th>
                                        <th>尺码</th>
                                        <th>名字</th>
                                        <th>号码</th>
                                        <th>其它</th>
                                        <th>件数</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="order-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </details>
        </div>

        <section class="file-section" aria-label="导入文件">
            <div class="file-row">
                <div class="file-meta">
                    <span class="file-kind">DXF 文件</span>
                    <span id="dxf-file-name" class="file-name empty" title="">未选择</span>
                </div>
                <div class="file-actions">
                    <button id="btn-select-dxf" type="button">选择</button>
                </div>
            </div>

            <div class="file-row">
                <div class="file-meta">
                    <span class="file-kind">RUL 文件</span>
                    <span id="rul-file-name" class="file-name empty" title="">未选择（可选）</span>
                </div>
                <div class="file-actions">
                    <button id="btn-select-rul" type="button">选择</button>
                    <button id="btn-clear-rul" class="icon-button" type="button" title="清除 RUL" aria-label="清除 RUL">×</button>
                </div>
            </div>

            <button id="btn-import" class="primary" type="button" disabled>开始导入</button>
        </section>

        <section class="result-section">
            <label class="result-label" for="result-box">运行结果</label>
            <textarea id="result-box" readonly placeholder="运行结果将显示在这里"></textarea>
        </section>
    </main>

    <script src="./js/CSInterface.js"></script>
    <script src="./js/main.js"></script>
</body>

</html>
